log4j.rootLogger=debug, stdout

log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.plain=org.apache.log4j.ConsoleAppender

# Pattern to output the caller's file name and line number.
log4j.appender.stdout.layout.ConversionPattern=%5p [%t] (%F:%L) - %m%n

log4j.appender.plain.layout=org.apache.log4j.PatternLayout
log4j.appender.plain.layout.ConversionPattern=%m%n

# Install a different appender for SystemCommand, and don't use the
# root one.
log4j.logger.uk.ac.ed.ltg.txm.util.SystemCommand=debug, plain
log4j.additivity.uk.ac.ed.ltg.txm.util.SystemCommand=false

log4j.logger.uk.ac.ed.ltg.ner.Config=trace
